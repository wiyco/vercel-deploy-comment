pre-commit:
  parallel: true
  jobs:
    - name: lint & format
      run: pnpm exec biome check --error-on-warnings --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    - name: typecheck
      run: pnpm exec tsc -b

post-merge:
  jobs:
    - name: install deps
      run: pnpm install --frozen-lockfile
      glob: pnpm-lock.yaml
